<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sphère Diplomatique</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">  <!-- NAVBAR -->  <header class="bg-black text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">Sphère Diplomatique</h1>
    <button id="menuBtn" class="md:hidden">☰</button>
    <nav id="menu" class="hidden md:flex gap-6">
      <a href="#" class="hover:underline">International</a>
      <a href="#" class="hover:underline">Politique</a>
      <a href="#" class="hover:underline">Économie</a>
      <a href="#" class="hover:underline">Université</a>
    </nav>
  </header>  <!-- HERO -->  <section class="text-center py-10 bg-white shadow">
    <h2 class="text-3xl font-bold">Actualités internationales</h2>
    <p class="text-gray-600">Analyse géopolitique et économique fiable</p>
  </section>  <!-- SEARCH -->  <div class="p-4 max-w-4xl mx-auto">
    <input id="search" type="text" placeholder="Rechercher un article..." class="w-full p-2 border rounded">
  </div>  <!-- ARTICLES -->  <section id="articles" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4 p-4 max-w-6xl mx-auto">
  </section>  <!-- MODAL -->  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
    <div class="bg-white p-6 rounded max-w-lg w-full">
      <h3 id="modalTitle" class="text-xl font-bold mb-2"></h3>
      <p id="modalContent"></p>
      <button onclick="window.location.href='article.html?title=' + article.title + '&content=' + article.content" class="mt-4 bg-black text-white px-4 py-2 rounded">Fermer</button>
    </div>
  </div>  <!-- FOOTER -->  <footer class="bg-black text-white text-center p-4 mt-6">
    © 2026 Sphère Diplomatique
  </footer>  <script>
    const data = [ 
      {
    title: "Haïti : situation actuelle",
    content: "Analyse complète de la situation en Haïti...",
    category: "International"
    },
  
     {
        title: "Guerre en Ukraine",
        content: "Analyse complète du conflit et impacts mondiaux.",
        category: "International"
      },
      {
        title: "Crise au Moyen-Orient",
        content: "Les tensions géopolitiques persistent.",
        category: "Politique"
      },
      {
        title: "Inflation mondiale",
        content: "Les économies s'adaptent à une inflation durable.",
        category: "Économie"
      },
      {
        title: "Afrique : croissance",
        content: "Une jeunesse moteur du développement.",
        category: "Économie"
      }
    ];

    const container = document.getElementById("articles");
    const search = document.getElementById("search");

    function displayArticles(list) {
      container.innerHTML = "";
      list.forEach(article => {
        const card = document.createElement("div");
        card.className = "bg-white p-4 rounded shadow hover:shadow-lg transition";
        card.innerHTML = `
          <h3 class="font-bold text-lg">${article.title}</h3>
          <p class="text-sm text-gray-600">${article.category}</p>
          <button class="mt-2 text-blue-500" onclick="openModal('${article.title}', '${article.content}')">Lire plus</button>
        `;
        container.appendChild(card);
      });
    }

    function openModal(title, content) {
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalContent").innerText = content;
      document.getElementById("modal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    search.addEventListener("input", () => {
      const value = search.value.toLowerCase();
      const filtered = data.filter(a => a.title.toLowerCase().includes(value));
      displayArticles(filtered);
    });

    document.getElementById("menuBtn").addEventListener("click", () => {
      document.getElementById("menu").classList.toggle("hidden");
    });

    displayArticles(data);
  </script></body>
</html>
